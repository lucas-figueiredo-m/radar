name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  version-and-publish:
    name: Publish npm & Create Release
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Sync version across packages
        run: bun run scripts/sync-version.ts ${{ steps.version.outputs.VERSION }}

      - name: Build radar-devtools
        run: cd packages/devtools && bun run build

      - name: Publish to npm
        run: |
          cd packages/devtools
          if npm view radar-devtools@${{ steps.version.outputs.VERSION }} version >/dev/null 2>&1; then
            echo "radar-devtools@${{ steps.version.outputs.VERSION }} already on npm — skipping publish"
          else
            npm publish --access public
          fi

      - name: Create GitHub Release
        run: |
          if gh release view ${{ github.ref_name }} >/dev/null 2>&1; then
            echo "GitHub release ${{ github.ref_name }} already exists — skipping"
          else
            gh release create ${{ github.ref_name }} --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/app/package.json packages/devtools/package.json
          if git diff --staged --quiet; then
            echo "No version-bump diff to commit (versions already at ${{ steps.version.outputs.VERSION }} on main) — skipping"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }} [skip ci]"
            HUSKY=0 git push origin HEAD:main
          fi

  build-electron:
    name: Build Electron (macOS)
    needs: version-and-publish
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Sync version
        run: bun run scripts/sync-version.ts ${{ steps.version.outputs.VERSION }}

      - name: Build app
        run: cd apps/app && bun run build

      - name: Package & publish Electron app
        run: cd apps/app && bunx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.RELEASES_GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
