name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  ci:
    name: CI
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  version-and-publish:
    name: Publish npm & Create Release
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Sync version across packages (in-memory; not committed back)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: bun run scripts/sync-version.ts "$VERSION"

      - name: Build radar-devtools
        run: cd packages/devtools && bun run build

      - name: Publish to npm
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cd packages/devtools
          if npm view "radar-devtools@$VERSION" version >/dev/null 2>&1; then
            echo "radar-devtools@$VERSION already on npm — skipping publish"
          else
            npm publish --access public --provenance
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$REF_NAME" >/dev/null 2>&1; then
            echo "GitHub release $REF_NAME already exists — skipping"
          else
            gh release create "$REF_NAME" --generate-notes
          fi

  build-electron:
    name: Build Electron (macOS)
    needs: version-and-publish
    runs-on: macos-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.3"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies (allow lifecycle scripts for native builds)
        run: bun install --frozen-lockfile

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Sync version (in-memory; not committed back)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: bun run scripts/sync-version.ts "$VERSION"

      - name: Build app
        run: cd apps/app && bun run build

      - name: Package & publish Electron app
        run: cd apps/app && bunx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.RELEASES_GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
