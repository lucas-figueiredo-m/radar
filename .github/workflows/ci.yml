name: CI

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (app)
        run: bun run --filter=radar-app lint

      - name: Lint (devtools)
        run: bun run --filter=radar-devtools lint

      - name: Typecheck (app)
        run: bun run --filter=radar-app typecheck

      - name: Typecheck (devtools)
        run: bun run --filter=radar-devtools typecheck

      - name: Typecheck (types)
        run: bun run --filter=@radar/types typecheck

      - name: Typecheck (landing)
        run: bun run --filter=radar-landing typecheck

      - name: Test (app)
        run: bun run --filter=radar-app test:run

      - name: Test (devtools)
        run: bun run --filter=radar-devtools test:run
