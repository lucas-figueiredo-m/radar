name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.3"
      - run: bun install --frozen-lockfile
      - run: cd apps/app && bun run lint
      - run: cd packages/devtools && bun run lint
      - run: cd packages/database && bun run lint
      - run: cd packages/mcp && bun run lint
      - run: cd packages/types && bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.3"
      - run: bun install --frozen-lockfile
      - run: cd apps/app && bun run typecheck
      - run: cd packages/devtools && bun run typecheck
      - run: cd packages/database && bun run typecheck
      - run: cd packages/mcp && bun run typecheck
      - run: cd packages/types && bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.3"
      - run: bun install --frozen-lockfile
      - run: cd apps/app && bun run test:run
      - run: cd packages/devtools && bun run test:run

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.3"
      - run: bun install --frozen-lockfile
      - run: bun audit --audit-level=low
