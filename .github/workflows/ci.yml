name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"
      - run: bun install --frozen-lockfile
      - run: cd apps/app && bun run lint
      - run: cd packages/devtools && bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"
      - run: bun install --frozen-lockfile
      - run: cd apps/app && bun run typecheck
      - run: cd packages/devtools && bun run typecheck
      - run: cd packages/types && bun run typecheck
      - run: cd apps/landing && bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"
      - run: bun install --frozen-lockfile
      - run: cd apps/app && bun run test:run
      - run: cd packages/devtools && bun run test:run
